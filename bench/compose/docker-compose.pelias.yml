# Minimal Pelias stack: Elasticsearch + libpostal + interpolation +
# api. Importers run once via `docker compose run --rm <importer>`.
# Driven by scripts/30-run-pelias.sh.
#
# Reference: https://github.com/pelias/docker

services:
  elasticsearch:
    image: pelias/elasticsearch:7.17.27
    container_name: pelias_elasticsearch
    user: "1000:1000"
    environment:
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - "discovery.type=single-node"
      - "bootstrap.memory_lock=true"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - ${PELIAS_DATA:-./data/pelias}/elasticsearch:/usr/share/elasticsearch/data

  libpostal:
    image: pelias/libpostal-service:latest
    container_name: pelias_libpostal
    ports:
      - "127.0.0.1:4400:4400"

  schema:
    image: pelias/schema:latest
    container_name: pelias_schema
    depends_on: [elasticsearch]
    volumes:
      - ${PELIAS_DATA:-./data/pelias}:/data
    environment:
      - PELIAS_CONFIG=/data/pelias.json
    command: ["./bin/create_index"]

  openstreetmap:
    image: pelias/openstreetmap:latest
    container_name: pelias_osm_importer
    depends_on: [elasticsearch, libpostal]
    volumes:
      - ${PELIAS_DATA:-./data/pelias}:/data
    environment:
      - PELIAS_CONFIG=/data/pelias.json
    command: ["./bin/start"]

  api:
    image: pelias/api:latest
    container_name: pelias_api
    depends_on: [elasticsearch, libpostal]
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ${PELIAS_DATA:-./data/pelias}:/data
    environment:
      - PORT=4000
      - PELIAS_CONFIG=/data/pelias.json
