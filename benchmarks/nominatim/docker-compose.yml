services:
  # mediagis/nominatim is the canonical maintained image. It pulls
  # the PBF on first run, runs the full multi-stage import, then
  # boots Apache + PHP. Switzerland import wall-clock on a modern
  # mac with 8 GB RAM allocated to Docker: typically 30-60 minutes.
  nominatim:
    image: mediagis/nominatim:4.4
    container_name: nominatim-bench
    ports:
      - "127.0.0.1:9999:8080"
    environment:
      PBF_URL: "https://download.geofabrik.de/europe/switzerland-latest.osm.pbf"
      REPLICATION_URL: "https://download.geofabrik.de/europe/switzerland-updates/"
      IMPORT_WIKIPEDIA: "false"
      NOMINATIM_PASSWORD: "bench"
      THREADS: "4"
    volumes:
      - pg_data:/var/lib/postgresql/14/main
      - flatnode:/nominatim/flatnode
    shm_size: 1g
    restart: "no"

volumes:
  pg_data:
  flatnode:
