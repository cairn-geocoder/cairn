services:
  # Photon CH-only index built from graphhopper.com's Swiss
  # photon-dump jsonl (~246 MB). Custom Dockerfile imports + serves;
  # avoids the 57 GB full-planet pull baked into rtuszik/photon-docker.
  photon:
    build:
      context: .
      dockerfile: Dockerfile
    image: cairn-bench-photon:ch
    container_name: photon-bench
    ports:
      - "127.0.0.1:2322:2322"
    volumes:
      - ./photon_data:/photon/data/photon_data
    restart: "no"
