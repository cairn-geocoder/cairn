services:
  # Photon ships an FST + Lucene index built FROM a Nominatim dump,
  # not directly from PBF. The official "photon-search/photon"
  # distribution provides a `--country-codes` mode that auto-pulls
  # an upstream search-index dump (saves the multi-hour Nominatim
  # bootstrap when you only want the binary index). We use that
  # path so the benchmark stays reproducible without a 100 GB
  # Postgres detour.
  photon:
    image: rtuszik/photon-docker:latest
    container_name: photon-bench
    ports:
      - "127.0.0.1:2322:2322"
    environment:
      COUNTRY_CODE: "ch"      # download Switzerland index slice
      UPDATE_STRATEGY: "PARALLEL"
    volumes:
      - ./photon_data:/photon/photon_data
    restart: "no"
